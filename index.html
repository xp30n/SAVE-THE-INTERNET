<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    />
    <title>SAVE THE INTERNET</title>
  </head>
  <body>
    <div class="landing-container">

      <!--TITLE CONTAINER-->
      <div class="title container" id="title">
        <p class="welcome-el" id="welcome-el"></p>
      </div>

      <!--GLOBE GIF-->
      <div class="gif-container" id="gif container">
        <img
        class="globe-gif"
        id="globe-gif"
        src="assets/images/globe.gif"
        alt="globe-anim"
        />
      </div>

      <!--START BUTTON-->
      <div class="button-container">
        <button class="start-btn" id="start-btn">START</button>
      </div>
    </div>

    <!--ANIME.JS SCRIPT-->
    <script src="https://cdn.jsdelivr.net/npm/animejs/lib/anime.min.js"></script>

    <!--JS SCRIPT-->
    <script src="js/script.js"></script>
  </body>
</html>
